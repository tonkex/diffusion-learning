<script>
/* ============================================================
   NAV DATA  (챕터 메타 정보 — 목차 추가 시 여기만 수정)
   ============================================================ */
const NAV = [
  { id:1, title:'정규분포', subs:[
      { id:'1.1', title:'1.1 확률의 기초', sections:[
          { id:'1.1.1', title:'확률 변수와 확률 분포' },

      ]},
      { id:'1.3', title:'1.3 중심 극한 정리', sections:[
          { id:'1.3.1', title:'중심 극한 정리란?' },
          { id:'1.3.2', title:'CLT 시뮬레이션' },
      ]},
      { id:'1.4', title:'1.4 표본 합의 분포', sections:[
          { id:'1.4.1', title:'기대값과 분산' },
          { id:'1.4.2', title:'표본 합 시뮬레이션' },
          { id:'1.4.3', title:'균등 분포의 통계량' },
      ]},
      { id:'1.5', title:'1.5 우리 주변의 정규 분포', sections:[
          { id:'1.5.1', title:'측정 오차·제품·키' },
      ]},
  ]},
  { id:2, title:'최대 가능도 추정', subs:[
      { id:'2.1', title:'2.1 생성 모델 개요', sections:[
          { id:'2.1.1', title:'생성 모델의 목표' },
          { id:'2.1.2', title:'모집단과 샘플' },
      ]},
      { id:'2.2', title:'2.2 생성 모델 구현', sections:[
          { id:'2.2.1', title:'키 데이터셋 불러오기' },

      ]},
      { id:'2.3', title:'2.3 MLE 이론', sections:[
          { id:'2.3.1', title:'가능도 최대화' },
          { id:'2.3.2', title:'미분으로 최댓값 찾기' },
          { id:'2.3.3', title:'정규 분포의 MLE 유도' },
      ]},
      { id:'2.4', title:'2.4 생성 모델의 용도', sections:[
          { id:'2.4.1', title:'새로운 데이터 생성' },
          { id:'2.4.2', title:'확률 계산' },
      ]},
  ]},
  { id:3,  title:'다변량 정규 분포',  subs:[] },
  { id:4,  title:'가우스 혼합 모델',  subs:[] },
  { id:5,  title:'EM 알고리즘',       subs:[] },
  { id:6,  title:'신경망',            subs:[] },
  { id:7,  title:'변이형 오토인코더', subs:[] },
  { id:8,  title:'확산모델 이론',     subs:[] },
  { id:9,  title:'확산모델 구현',     subs:[] },
  { id:10, title:'확산모델 응용',     subs:[] },
];

/* ============================================================
   FLAT SECTION LIST  (prev/next 네비게이션용)
   ============================================================ */
const FLAT_SECTIONS = [];
NAV.forEach(ch => {
  ch.subs.forEach(sub => {
    sub.sections.forEach(sec => {
      FLAT_SECTIONS.push({ id: sec.id, ch, sub, sec });
    });
  });
});

/* ============================================================
   CONTENT & CHART 레지스트리  (각 chXX.js 가 채워 넣음)
   ============================================================ */
const CONTENT     = {};   // CONTENT['1.1.1'] = () => `html...`
const CHART_INITS = {};   // CHART_INITS['1.1.1'] = initFn

/* ============================================================
   SHARED MATH HELPERS
   ============================================================ */
function normalPDF(x, mu, sigma) {
  return (1 / (Math.sqrt(2 * Math.PI) * sigma)) *
         Math.exp(-Math.pow(x - mu, 2) / (2 * sigma * sigma));
}
function linspace(a, b, n) {
  const step = (b - a) / (n - 1);
  return Array.from({ length: n }, (_, i) => a + i * step);
}
function numericalIntegral(a, b, f, n = 200) {
  if (a >= b) return 0;
  const h = (b - a) / n;
  let sum = (f(a) + f(b)) / 2;
  for (let i = 1; i < n; i++) sum += f(a + i * h);
  return sum * h;
}

/* ============================================================
   DYNAMIC CHAPTER LOADER
   ============================================================ */
const _loadedChapters = new Set();

function ensureChapterLoaded(chId, callback) {
  if (_loadedChapters.has(chId)) { callback(); return; }
  const script = document.createElement('script');
  script.src = `chapters/ch${String(chId).padStart(2, '0')}.js`;
  script.onload = () => { _loadedChapters.add(chId); callback(); };
  script.onerror = () => { _loadedChapters.add(chId); callback(); }; // 없으면 기본 콘텐츠로
  document.head.appendChild(script);
}

function buildChapterCard(ch) {
  const hasContent = ch.subs.length > 0;
  const card = document.createElement('div');
  card.className = 'chapter-card';
  const svg = CH_ILLUSTRATIONS[ch.id] || '';
  card.innerHTML = `${svg ? `<div class="card-illustration">${svg}</div>` : ''}
    <div class="card-body">
      <div class="num">Chapter ${ch.id}</div>
      <div class="title">${ch.title}</div>
      <div class="badge${hasContent ? '' : ' soon'}">${hasContent ? '학습 가능' : '준비중'}</div>
    </div>`;
  if (hasContent) card.onclick = () => toggleChapter(ch.id, true);
  return card;
}

/* ============================================================
   BUILD SIDEBAR
   ============================================================ */
(function buildSidebar() {
  const navEl  = document.getElementById('nav');
  const cardsEl = document.getElementById('chapter-cards');

  NAV.forEach(ch => {
    const hasContent = ch.subs.length > 0;

    // 홈 화면 카드
    cardsEl.appendChild(buildChapterCard(ch));

    // 사이드바 블록
    const block  = document.createElement('div');
    block.className = 'ch-block';
    block.id = `ch-block-${ch.id}`;

    const toggle = document.createElement('div');
    toggle.className = 'ch-toggle';
    toggle.id = `ch-toggle-${ch.id}`;
    toggle.innerHTML = `<span class="ch-num">${ch.id}</span>
      <span>${ch.title}</span>
      <span class="ch-arrow">▼</span>`;
    if (hasContent) toggle.onclick = () => toggleChapter(ch.id);
    else toggle.style.opacity = '0.4';

    const subsDiv = document.createElement('div');
    subsDiv.className = 'ch-subs';
    subsDiv.id = `ch-subs-${ch.id}`;

    ch.subs.forEach(sub => {
      const subLabel = document.createElement('div');
      subLabel.className = 'sub-item placeholder';
      subLabel.style.cssText = 'padding-left:18px;color:#475569;font-weight:700;font-size:0.76rem;cursor:default;';
      subLabel.textContent = sub.title;
      subsDiv.appendChild(subLabel);

      sub.sections.forEach(sec => {
        const item = document.createElement('div');
        item.className = 'sub-item';
        item.id = `nav-${sec.id}`;
        item.textContent = sec.title;
        item.onclick = () => loadSection(sec.id, ch, sub, sec);
        subsDiv.appendChild(item);
      });
    });

    block.appendChild(toggle);
    block.appendChild(subsDiv);
    navEl.appendChild(block);
  });
})();

/* ============================================================
   NAVIGATION HELPERS
   ============================================================ */
function toggleChapter(id, open = null) {
  const toggle = document.getElementById(`ch-toggle-${id}`);
  const subs   = document.getElementById(`ch-subs-${id}`);
  const isOpen = toggle.classList.contains('open');
  const shouldOpen = open !== null ? open : !isOpen;
  toggle.classList.toggle('open', shouldOpen);
  subs.classList.toggle('open', shouldOpen);
}

function buildPageNav(currentId) {
  const idx  = FLAT_SECTIONS.findIndex(s => s.id === currentId);
  const prev = idx > 0                        ? FLAT_SECTIONS[idx - 1] : null;
  const next = idx < FLAT_SECTIONS.length - 1 ? FLAT_SECTIONS[idx + 1] : null;

  const prevBtn = prev
    ? `<button class="nav-btn nav-btn-prev"
         onclick="loadSection('${prev.id}',FLAT_SECTIONS[${idx-1}].ch,FLAT_SECTIONS[${idx-1}].sub,FLAT_SECTIONS[${idx-1}].sec)">
         <span class="nav-arrow">◀</span>
         <div class="nav-info">
           <div class="nav-label">이전 페이지</div>
           <div class="nav-title">${prev.sec.title}</div>
         </div>
       </button>`
    : `<div class="nav-spacer"></div>`;

  const nextBtn = next
    ? `<button class="nav-btn nav-btn-next"
         onclick="loadSection('${next.id}',FLAT_SECTIONS[${idx+1}].ch,FLAT_SECTIONS[${idx+1}].sub,FLAT_SECTIONS[${idx+1}].sec)">
         <div class="nav-info">
           <div class="nav-label">다음 페이지</div>
           <div class="nav-title">${next.sec.title}</div>
         </div>
         <span class="nav-arrow">▶</span>
       </button>`
    : `<div class="nav-spacer"></div>`;

  return `<div class="page-nav">
    ${prevBtn}
    <button class="nav-btn nav-btn-home" onclick="showWelcome()">
      <span class="nav-home-icon">📚</span>
      <span class="nav-home-label">전체 챕터</span>
    </button>
    ${nextBtn}
  </div>`;
}

function showWelcome() {
  destroyCharts();
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
  document.getElementById('breadcrumb').innerHTML = '챕터를 선택해 학습을 시작하세요';
  NAV.forEach(ch => toggleChapter(ch.id, false));

  const area = document.getElementById('content-area');
  area.innerHTML = `
    <div class="welcome" id="welcome-screen">
      <h2>📐 확산모델 학습</h2>
      <p>왼쪽 메뉴에서 챕터를 선택하면 학습 내용이 표시됩니다.<br>
         수식, 인터렉티브 시뮬레이션, 코드 예시가 포함되어 있습니다.</p>
      <div class="chapter-cards" id="chapter-cards-dyn"></div>
    </div>`;

  const cards2 = document.getElementById('chapter-cards-dyn');
  NAV.forEach(ch => cards2.appendChild(buildChapterCard(ch)));
  area.scrollTop = 0;
}

/* ============================================================
   SECTION LOADER
   ============================================================ */
let activeChartInstances = {};

function destroyCharts() {
  Object.values(activeChartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  activeChartInstances = {};
}

function loadSection(id, ch, sub, sec) {
  // 사이드바 상태 업데이트
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
  const navItem = document.getElementById(`nav-${id}`);
  if (navItem) navItem.classList.add('active');
  toggleChapter(ch.id, true);

  // 브레드크럼
  document.getElementById('breadcrumb').innerHTML =
    `Chapter ${ch.id} · ${ch.title} &nbsp;›&nbsp; <span>${sub.title}</span> › ${sec.title}`;

  destroyCharts();

  // 로딩 표시
  const area = document.getElementById('content-area');
  area.innerHTML = `<div class="loading-msg"><span class="spinner">⏳</span>콘텐츠를 불러오는 중...</div>`;
  area.scrollTop = 0;

  // 챕터 JS 로드 후 콘텐츠 주입
  ensureChapterLoaded(ch.id, () => {
    const htmlContent = (CONTENT[id] ? CONTENT[id]() : _defaultContent(id, ch, sub, sec));
    area.innerHTML = htmlContent + buildPageNav(id);
    area.scrollTop = 0;

    const ws = document.getElementById('welcome-screen');
    if (ws) ws.remove();

    if (window.MathJax) {
      MathJax.typesetPromise([area]).then(() => {
        if (CHART_INITS[id]) CHART_INITS[id]();
        setupCodeBlocks();
      });
    } else {
      if (CHART_INITS[id]) CHART_INITS[id]();
      setupCodeBlocks();
    }
  });
}

function setupCodeBlocks() {
  if (!window.hljs) return;
  document.querySelectorAll('pre.code-pre code').forEach(el => {
    hljs.highlightElement(el);
    const lines = el.innerHTML.split('\n');
    if (lines[lines.length - 1] === '') lines.pop();
    el.innerHTML = lines.map((l, i) =>
      `<span class="hlpy-line" data-ln="${i + 1}">${l || ' '}</span>`
    ).join('');
  });
  document.querySelectorAll('pre.code-pre').forEach(pre => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 복사';
    btn.onclick = () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(() => {
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 복사됨';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 복사';
          btn.classList.remove('copied');
        }, 2000);
      });
    };
    pre.appendChild(btn);
  });
}

function _defaultContent(id, ch, sub, sec) {
  return `<div class="page-title">${sec.title}</div>
    <div class="page-subtitle">Chapter ${ch.id} · ${ch.title} › ${sub.title}</div>
    <div class="section">
      <div class="section-title"><span class="icon">🚧</span> 준비중</div>
      <p>이 절의 내용은 현재 준비중입니다. 다른 챕터를 먼저 학습해 보세요.</p>
      <a href="#" class="ch-link" onclick="toggleChapter(1,true);return false;">← Chapter 1 정규분포로 이동</a>
    </div>`;
}
</script>
